<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover extends content behind the iPhone notch / home bar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Chrome / Android -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Safari / iOS — manifest display:standalone is ignored by Safari, so we
         must declare these explicitly for the app to truly feel native there.  -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GymTracker" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <link rel="icon" type="image/png" href="/icon-192.png" />
    <title>GymTracker</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
